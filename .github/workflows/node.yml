name: Node.js CI

on:
  push:
    paths:
      - 'assets/**'
      - 'package.json'
      - 'package-lock.json'
      - 'webpack.config.js'
      - 'tsconfig.json'
      - 'eslint.config.js'
      - '.github/workflows/node.yml'
  workflow_dispatch:

jobs:
  node:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Create empty .env
        run: touch .env

      - name: Install dependencies
        run: docker compose run --rm node npm install

      - name: Run lint
        run: docker compose run --rm node npm run lint

      - name: Run build
        run: docker compose run --rm node npm run build
