name: Phpunit

on:
  push:
    paths-ignore:
      - 'assets/**'
      - 'package.json'
      - 'package-lock.json'
      - 'webpack.config.js'
      - 'tsconfig.json'
      - 'eslint.config.js'
      - '.github/workflows/node.yml'
  workflow_dispatch:

jobs:
  docker:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          extensions: opentelemetry, redis

      - name: Install dependencies
        run: composer install

      - name: Run cs-fixer-check
        run: composer cs-fixer-check

      - name: Run phpstan
        run: composer phpstan

      - name: Fix permissions for bin/dist
        run: chmod -R 777 bin/dist

      - name: Run tests
        run: composer tests
